name: Lint & Typecheck (Creator)

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/bukae_creator/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.nvmrc'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (creator)
        run: pnpm --filter bookae_creator lint

      - name: Typecheck (creator)
        run: pnpm --filter bookae_creator typecheck
