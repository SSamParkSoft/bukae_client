name: Build Check (Analyze)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/bukae_analyze/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.nvmrc'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (analyze)
        run: pnpm --filter bukae_analyze build
