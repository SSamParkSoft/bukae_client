name: CodeRabbit Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read

jobs:
  coderabbit-major-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: resolve_pr
        uses: actions/github-script@v7
        with:
          script: |
            const isCodeRabbit = (value) => {
              if (!value || typeof value !== 'string') return false;
              const v = value.toLowerCase();
              return (
                v === 'coderabbitai' ||
                v === 'coderabbit[bot]' ||
                v.includes('coderabbit')
              );
            };

            let prNumber = null;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request?.number ?? null;
            } else if (context.eventName === 'issue_comment') {
              if (context.payload.issue?.pull_request) {
                prNumber = context.payload.issue.number;
              }
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request?.number ?? null;
            } else if (context.eventName === 'pull_request_review_comment') {
              prNumber = context.payload.pull_request?.number ?? null;
            } else if (context.eventName === 'check_run') {
              const checkName = context.payload.check_run?.name ?? '';
              const appName = context.payload.check_run?.app?.name ?? '';
              if (!isCodeRabbit(checkName) && !isCodeRabbit(appName)) {
                core.info('Skip: check_run event is not from CodeRabbit.');
                core.setOutput('should_check', 'false');
                return;
              }
              const prs = context.payload.check_run?.pull_requests ?? [];
              if (prs.length > 0) {
                prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              core.setOutput('should_check', 'false');
              return;
            }

            core.setOutput('should_check', 'true');
            core.setOutput('pr_number', String(prNumber));

      - name: Block major/critical CodeRabbit findings
        if: steps.resolve_pr.outputs.should_check == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.resolve_pr.outputs.pr_number }}');
            const opts = {
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const isCodeRabbit = (login) => {
              if (!login || typeof login !== 'string') return false;
              const l = login.toLowerCase();
              return (
                l === 'coderabbitai' ||
                l === 'coderabbit[bot]' ||
                l.includes('coderabbit')
              );
            };
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const majorPatterns = [
              /Potential issue\s*\|\s*Critical/i,
              /Potential issue\s*\|\s*Major/i,
              /\bCritical\b.*\b(issue|finding)\b/i,
              /\bMajor\b.*\b(issue|finding)\b/i,
              /🔴.*Critical/i,
            ];
            const hasMajorOrCritical = (body) =>
              majorPatterns.some((re) => re.test(body || ''));

            const { data: pr } = await github.rest.pulls.get({
              ...opts,
              pull_number: prNumber,
            });

            if (pr.state !== 'open' || pr.merged) {
              core.info(`PR #${prNumber} is not open. Skip.`);
              return;
            }

            const reasons = [];

            const loadCodeRabbitCheckRun = async () => {
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  ...opts,
                  ref: pr.head.sha,
                  per_page: 100,
                  filter: 'all',
                },
                (res) => res.data.check_runs || []
              );

              const matches = checkRuns.filter((c) => {
                const n = (c.name || '').toLowerCase();
                const a = (c.app?.name || '').toLowerCase();
                return n.includes('coderabbit') || a.includes('coderabbit');
              });

              if (matches.length === 0) return null;

              matches.sort((a, b) => {
                const ta = new Date(a.completed_at || a.started_at || a.created_at || 0).getTime();
                const tb = new Date(b.completed_at || b.started_at || b.created_at || 0).getTime();
                return tb - ta;
              });
              return matches[0];
            };

            // Guard must not succeed before CodeRabbit has finished.
            const maxWaitMs = 10 * 60 * 1000;
            const pollIntervalMs = 15000;
            const waitStartedAt = Date.now();
            let codeRabbitCheck = await loadCodeRabbitCheckRun();

            while (
              (!codeRabbitCheck || codeRabbitCheck.status !== 'completed') &&
              Date.now() - waitStartedAt < maxWaitMs
            ) {
              const status = codeRabbitCheck?.status ?? 'not_found';
              core.info(`Waiting for CodeRabbit check run to complete. current_status=${status}`);
              await sleep(pollIntervalMs);
              codeRabbitCheck = await loadCodeRabbitCheckRun();
            }

            if (!codeRabbitCheck) {
              core.setFailed('CodeRabbit check run is still pending (not found yet). Re-run after CodeRabbit finishes.');
              return;
            }
            if (codeRabbitCheck.status !== 'completed') {
              core.setFailed(`CodeRabbit check run is still pending (status=${codeRabbitCheck.status}).`);
              return;
            }

            // 1) PR conversation comments (issue comments)
            const issueComments = await github.paginate(github.rest.issues.listComments, {
              ...opts,
              issue_number: prNumber,
              per_page: 100,
            });
            const issueMajor = issueComments.filter(
              (c) => isCodeRabbit(c.user?.login) && hasMajorOrCritical(c.body)
            );
            if (issueMajor.length > 0) {
              reasons.push(`conversation comments: ${issueMajor.length}`);
            }

            // 2) PR review summaries
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              ...opts,
              pull_number: prNumber,
              per_page: 100,
            });
            const reviewChangesRequested = reviews.find(
              (r) => isCodeRabbit(r.user?.login) && r.state === 'CHANGES_REQUESTED'
            );
            if (reviewChangesRequested) {
              reasons.push('CodeRabbit review state is CHANGES_REQUESTED');
            }
            const reviewMajor = reviews.filter(
              (r) => isCodeRabbit(r.user?.login) && hasMajorOrCritical(r.body)
            );
            if (reviewMajor.length > 0) {
              reasons.push(`review summaries: ${reviewMajor.length}`);
            }

            // 3) Inline review comments
            const inlineComments = await github.paginate(github.rest.pulls.listReviewComments, {
              ...opts,
              pull_number: prNumber,
              per_page: 100,
            });
            const inlineMajor = inlineComments.filter(
              (c) => isCodeRabbit(c.user?.login) && hasMajorOrCritical(c.body)
            );
            if (inlineMajor.length > 0) {
              reasons.push(`inline comments: ${inlineMajor.length}`);
            }

            // 4) CodeRabbit check run conclusion
            if (
              codeRabbitCheck &&
              codeRabbitCheck.status === 'completed' &&
              ['failure', 'cancelled', 'timed_out', 'action_required'].includes(codeRabbitCheck.conclusion || '')
            ) {
              reasons.push(`check run conclusion: ${codeRabbitCheck.conclusion}`);
            }

            if (reasons.length > 0) {
              core.setFailed(
                `CodeRabbit major/critical findings detected for PR #${prNumber}: ${reasons.join(', ')}`
              );
            } else {
              core.info(`No blocking CodeRabbit major/critical findings for PR #${prNumber}.`);
            }
